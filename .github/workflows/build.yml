name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc bison gzip groff

      - name: Build
        run: |
          cd src
          make clean
          make

      - name: Generate documentation
        run: |
          cd src
          make zmac.1.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmac-linux
          path: |
            src/zmac
            src/zmac.1.gz
            src/zmac.1.pdf

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install mingw winflexbison -y

      - name: Setup bison path
        run: |
          $bisonPath = (Get-Command win_bison -ErrorAction SilentlyContinue).Source
          if ($bisonPath) {
            New-Item -ItemType SymbolicLink -Path "C:\ProgramData\Chocolatey\bin\bison.exe" -Target $bisonPath -Force
          }
        shell: powershell

      - name: Build
        shell: cmd
        run: |
          cd src
          build.bat

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmac-windows
          path: |
            src/zmac.exe
            src/zmac.1.pdf

  build-windows-32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 for 32-bit build
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            bison

      - name: Build native 32-bit executable
        shell: msys2 {0}
        run: |
          cd src
          gcc -Wall -static -o doc.exe -DMK_DOC doc.c
          ./doc.exe >/dev/null
          bison --output=zmac.c zmac.y
          gcc -Wall -static -s -o zmac32.exe -DMSDOS zmac.c mio.c doc.c zi80dis.c

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmac-windows-32
          path: |
            src/zmac32.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gcc bison groff

      - name: Build
        run: |
          cd src
          make clean
          make

      - name: Generate documentation
        run: |
          cd src
          make zmac.1.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmac-macos
          path: |
            src/zmac
            src/zmac.1.gz
            src/zmac.1.pdf

  release:
    needs: [build-linux, build-windows, build-windows-32, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release zip
        run: |
          zip -r zmac-release.zip zmac-linux/ zmac-windows/ zmac-windows-32/ zmac-macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: zmac-release.zip
